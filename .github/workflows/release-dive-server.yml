name: PyPI Publish dive_server
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write  # Required for PyPI trusted publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Build release assets
        run: bash scripts/build_release_assets.sh

      - name: Build Python package
        run: uv build

      - name: Verify wheel contains web assets
        run: |
          python -m zipfile -l dist/*.whl | grep -q 'dive_server/dive_client/index.html'
          python -m zipfile -l dist/*.whl | grep -q 'dive_server/web_client/dist/girder-plugin-dive.umd.cjs'

      - name: Publish to PyPI
        run: uv publish
