# Girder 5 + DIVE from published PyPI packages (release install smoke test).
#
#   docker compose -f test_deployment/docker-compose.pypi.yml up --build
#
# Uses different host ports / volume names than docker-compose.yml so both
# stacks can run side by side.
#
#   http://localhost:8011/girder   (admin / letmein)
#   http://localhost:8011/dive
#   http://localhost:15673         (RabbitMQ, guest / guest)
#
# Override pins at build time, e.g.:
#   docker compose -f test_deployment/docker-compose.pypi.yml build \
#     --build-arg DIVE_DSA_VERSION=0.0.1 --build-arg PYTHON_GIRDER=5.0.12

name: dive-dsa-package-pypi

x-broker-env: &broker-env
  GIRDER_WORKER_BROKER: amqp://guest:guest@rabbit/default
  GIRDER_WORKER_BACKEND: rpc://guest:guest@localhost/
  GIRDER_MONGO_URI: mongodb://mongo:27017/girder
  GIRDER_NOTIFICATION_REDIS_URL: redis://redis:6379

services:
  rabbit:
    image: rabbitmq:4.2-management
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: default
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit consumer_timeout 432000000

  mongo:
    image: mongo:5.0
    volumes:
      - pypi_test_mongo:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --maxclients 1000

  girder:
    build:
      context: ..
      dockerfile: test_deployment/Dockerfile.pypi
      target: girder
      args:
        GIRDER_VERSION: v5.0.12
        PYTHON_GIRDER: "5.0.12"
        DIVE_DSA_VERSION: "0.0.1"
    image: dive-dsa-girder5-pypi:local
    init: true
    ports:
      - "8010:8080"
    volumes:
      - pypi_test_assetstore:/home/assetstore
    depends_on:
      - mongo
      - redis
      - rabbit
    environment:
      <<: *broker-env
      GIRDER_NOTIFICATION_REDIS_URL: redis://redis:6379?max_connections=512
      GIRDER_ADMIN_USER: admin
      GIRDER_ADMIN_PASS: letmein
      GIRDER_SETTING_WORKER_API_URL: http://girder:8080/api/v1
      GIRDER_STATIC_ROOT_DIR: /opt/dive/clients/girder
      CORS_ALLOWED_ORIGINS: http://localhost:8011

  localworker:
    image: dive-dsa-girder5-pypi:local
    init: true
    entrypoint:
      - celery
      - -A
      - girder_worker.app
      - worker
      - -Q
      - local
      - -c
      - "2"
      - -l
      - info
    depends_on:
      - girder
      - rabbit
    environment:
      <<: *broker-env
      C_FORCE_ROOT: "1"

  worker:
    build:
      context: ..
      dockerfile: test_deployment/Dockerfile.pypi
      target: worker
      args:
        DIVE_DSA_VERSION: "0.0.1"
    image: dive-dsa-girder5-pypi-worker:local
    init: true
    depends_on:
      - girder
      - rabbit
    environment:
      <<: *broker-env
      GIRDER_SETTING_WORKER_API_URL: http://girder:8080/api/v1
      WORKER_WATCHING_QUEUES: celery
      WORKER_CONCURRENCY: "2"

volumes:
  pypi_test_mongo:
  pypi_test_assetstore:
