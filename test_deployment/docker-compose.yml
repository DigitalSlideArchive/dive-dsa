# Girder 5 package-install smoke test.
#
# Installs Girder from PyPI and DIVE from a wheel built inside Docker
# (SPA + plugin UI bundled into dive_server). No host npm/uv build required.
#
#   docker compose -f test_deployment/docker-compose.yml up --build
#
#   http://localhost:8010/girder   (admin / letmein)
#   http://localhost:8010/dive
#   http://localhost:15672         (RabbitMQ, guest / guest)
#
# Optional host wheel path (faster iteration): bash test_deployment/prepare.sh
# then use the legacy Dockerfiles — see README.md.

x-broker-env: &broker-env
  GIRDER_WORKER_BROKER: amqp://guest:guest@rabbit/default
  GIRDER_WORKER_BACKEND: rpc://guest:guest@localhost/
  GIRDER_MONGO_URI: mongodb://mongo:27017/girder
  GIRDER_NOTIFICATION_REDIS_URL: redis://redis:6379

services:
  rabbit:
    image: rabbitmq:4.2-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: default
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit consumer_timeout 432000000

  mongo:
    image: mongo:5.0
    volumes:
      - package_test_mongo:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --maxclients 1000

  girder:
    build:
      context: ..
      dockerfile: test_deployment/Dockerfile
      target: girder
      args:
        GIRDER_VERSION: v5.0.12
        PYTHON_GIRDER: "5.0.12"
    image: dive-dsa-girder5-package:local
    init: true
    ports:
      - "8010:8080"
    volumes:
      - package_test_assetstore:/home/assetstore
    depends_on:
      - mongo
      - redis
      - rabbit
    environment:
      <<: *broker-env
      # Shared WebSocket notification pool; raise above default 100 under reconnect load.
      GIRDER_NOTIFICATION_REDIS_URL: redis://redis:6379?max_connections=512
      GIRDER_ADMIN_USER: admin
      GIRDER_ADMIN_PASS: letmein
      GIRDER_SETTING_WORKER_API_URL: http://girder:8080/api/v1
      # Girder 5 core UI built with --base=/girder/ (see Dockerfile girder-web stage)
      GIRDER_STATIC_ROOT_DIR: /opt/dive/clients/girder
      CORS_ALLOWED_ORIGINS: http://localhost:8010

  # Girder 5 "local" queue (assetstore import follow-up, metadata ingest, etc.)
  localworker:
    image: dive-dsa-girder5-package:local
    init: true
    entrypoint:
      - celery
      - -A
      - girder_worker.app
      - worker
      - -Q
      - local
      - -c
      - "2"
      - -l
      - info
    depends_on:
      - girder
      - rabbit
    environment:
      <<: *broker-env
      C_FORCE_ROOT: "1"

  # DIVE celery worker (pipelines, transcoding, etc.)
  worker:
    build:
      context: ..
      dockerfile: test_deployment/Dockerfile
      target: worker
    image: dive-dsa-girder5-package-worker:local
    init: true
    depends_on:
      - girder
      - rabbit
    environment:
      <<: *broker-env
      GIRDER_SETTING_WORKER_API_URL: http://girder:8080/api/v1
      WORKER_WATCHING_QUEUES: celery
      WORKER_CONCURRENCY: "2"

volumes:
  package_test_mongo:
  package_test_assetstore:
